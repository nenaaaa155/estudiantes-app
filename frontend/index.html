<!DOCTYPE html>
<html>
<head>
    <title>Estudiantes App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            margin-top: 100px;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #app {
            display: none;
            padding: 20px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0px 0px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
    <h2>🔐 Login OTP</h2>

    <input id="email" placeholder="Correo"><br>
    <button onclick="sendOTP()">Enviar OTP</button>

    <input id="otp" placeholder="Código OTP"><br>
    <button onclick="verifyOTP()">Ingresar</button>
</div>

<!-- APP -->
<div id="app">

    <div class="topbar">
        <h2>📊 Estudiantes</h2>
        <button onclick="logout()">Cerrar sesión</button>
    </div>

    <div class="container" style="margin-top:20px;">
        <h3>Gestión</h3>

        <input id="name" placeholder="Nombre">
        <input id="age" placeholder="Edad">
        <input id="grade" placeholder="Grado">

        <button onclick="createStudent()">Crear</button>
        <button onclick="updateStudent()">Actualizar</button>
    </div>

    <h3 style="text-align:center;">Lista</h3>

    <ul id="list"></ul>

</div>

<script>
const API = "https://estudiantes-app-rfxr.onrender.com/";
let currentId = null;

// -------- SESIÓN --------
function loginSuccess() {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    getStudents();
}

function logout() {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
}

// -------- OTP --------
async function sendOTP() {
    const email = document.getElementById("email").value;

    await fetch(`${API}/auth/send-otp?email=${email}`, {
        method: "POST"
    });

    alert("OTP enviado");
}

async function verifyOTP() {
    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;

    const res = await fetch(`${API}/auth/verify-otp?email=${email}&otp=${otp}`, {
        method: "POST"
    });

    const data = await res.json();

    if (data.message) {
        loginSuccess();
    } else {
        alert(data.detail);
    }
}

// -------- CRUD --------
async function createStudent() {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const grade = document.getElementById("grade").value;

    await fetch(`${API}/students?name=${name}&age=${age}&grade=${grade}`, {
        method: "POST"
    });

    clearInputs();
    getStudents();
}

async function getStudents() {
    const res = await fetch(`${API}/students`);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(s => {
        const li = document.createElement("li");

        li.innerHTML = `
            <b>${s.name}</b> - Edad: ${s.age} - Grado: ${s.grade}
            <br><br>
            <button onclick="editStudent(${s.id}, '${s.name}', ${s.age}, ${s.grade})">✏️ Editar</button>
            <button onclick="deleteStudent(${s.id})">❌ Eliminar</button>
        `;

        list.appendChild(li);
    });
}

function editStudent(id, name, age, grade) {
    document.getElementById("name").value = name;
    document.getElementById("age").value = age;
    document.getElementById("grade").value = grade;

    currentId = id;
}

async function updateStudent() {
    if (!currentId) {
        alert("Selecciona un estudiante primero");
        return;
    }

    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const grade = document.getElementById("grade").value;

    await fetch(`${API}/students/${currentId}?name=${name}&age=${age}&grade=${grade}`, {
        method: "PUT"
    });

    currentId = null;
    clearInputs();
    getStudents();
}

async function deleteStudent(id) {
    await fetch(`${API}/students/${id}`, {
        method: "DELETE"
    });

    getStudents();
}

function clearInputs() {
    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("grade").value = "";
}
</script>

</body>
</html>
